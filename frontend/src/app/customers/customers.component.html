<div>
    <table class="table table-striped">
        <thead>
            <tr>
                <td>ID</td>
                <td>Nom</td>
                <td>E-Mail</td>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let c of customers | async">
                <td>{{c.id}}</td>
                <td>{{c.name}}</td>
                <td>{{c.email}}</td>
            </tr>
        </tbody>
    </table>
</div>
